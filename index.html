<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="asset/img/favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZQ-URL</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.16/dist/tailwind.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #e0e7ff 0%, #f0fdf4 100%);
      font-family: 'Arial', sans-serif;
      color: #333;
      min-height: 100vh;
    }
    main {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 8rem);
      text-align: center;
    }
    .container {
      background: rgba(255,255,255,0.98);
      border-radius: 18px;
      padding: 48px 32px 32px 32px;
      box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.18);
      max-width: 420px;
      width: 100%;
      margin: 32px auto;
      transition: box-shadow 0.3s;
    }
    .container:hover {
      box-shadow: 0 12px 40px 0 rgba(31, 38, 135, 0.22);
    }
    input, select {
      width: 100%;
      padding: 14px 16px;
      border-radius: 10px;
      border: 1px solid #d1d5db;
      margin-bottom: 12px;
      font-size: 1.1em;
      background: #f9fafb;
      transition: border 0.2s, box-shadow 0.2s;
    }
    input:focus, select:focus {
      border: 1.5px solid #6366f1;
      box-shadow: 0 0 0 2px #a5b4fc;
      outline: none;
      background: #fff;
    }
    button {
      background: linear-gradient(90deg, #22c55e 0%, #3b82f6 100%);
      color: white;
      font-size: 1.15em;
      border: none;
      border-radius: 10px;
      padding: 14px 0;
      width: 100%;
      margin-top: 10px;
      font-weight: 700;
      box-shadow: 0 2px 8px rgba(34,197,94,0.08);
      transition: background 0.2s, box-shadow 0.2s;
    }
    button:hover {
      background: linear-gradient(90deg, #16a34a 0%, #2563eb 100%);
      box-shadow: 0 4px 16px rgba(59,130,246,0.12);
    }
    .success, .error {
      padding: 12px 20px;
      border-radius: 8px;
      margin-bottom: 18px;
      font-weight: 600;
      font-size: 1.05em;
    }
    .success {
      background-color: #d1fae5;
      color: #047857;
    }
    .error {
      background-color: #fee2e2;
      color: #b91c1c;
    }
    h1 {
      font-size: 2.3em;
      font-weight: 800;
      margin-bottom: 18px;
      color: #2563eb;
      letter-spacing: 1px;
    }
    label {
      display: block;
      margin-bottom: 6px;
      font-size: 1em;
      color: #374151;
      text-align: left;
    }
    @media (max-width: 600px) {
      .container {
        padding: 24px 8px 18px 8px;
        max-width: 98vw;
      }
      h1 {
        font-size: 1.5em;
      }
      button {
        font-size: 1em;
        padding: 12px 0;
      }
      input, select {
        font-size: 1em;
        padding: 10px 12px;
      }
    }
    footer {
      background: rgba(255,255,255,0.95);
      padding: 16px 0 8px 0;
      text-align: center;
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      box-shadow: 0px -2px 5px rgba(0, 0, 0, 0.07);
      font-size: 0.98em;
    }
  </style>
</head>

<body>
  <main>
    <div class="container">
      <h1 class="text-3xl font-bold text-gray-800">ZQ-URL</h1>
      <div x-data="app" x-cloak>
        <p x-show.transition.opacity="alert" :class="alert?.type" x-text="alert?.message"></p>
        <div class="mb-4">
          <input placeholder="输入要缩短的网址..." x-model="url" x-ref="url"
            class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:shadow-outline" />
        </div>
        <div class="mb-4">
          <input placeholder="自定义短链接后缀 (可选)" x-model="slug"
            class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:shadow-outline" />
        </div>
        <div class="mb-4">
          <label for="expiry" class="block text-sm font-medium text-gray-700 mb-1">过期时间 (可选):</label>
          <select id="expiry" x-model="expiry"
            class="block w-full pl-3 pr-10 py-2 text-base border-gray-300 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm rounded-md">
            <option value="">永不过期</option>
            <option value="5m">5 分钟</option>
            <option value="1h">1 小时</option>
            <option value="12h">12 小时</option>
            <option value="1d">1 天</option>
            <option value="7d">1 周</option>
          </select>
        </div>
        <button :class="{ loading }" :disabled="loading || isValidated()" @click="submit($refs, $nextTick)"
          class="bg-green-500 hover:bg-green-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline">
          生成
        </button>
      </div>
    </div>
  </main>
  <footer class="text-gray-600">
      <a href="https://github.com/BAYUEQI/ZQ-URL">ZQ-URL</a> | 
      <a href="/manage" class="text-blue-600 hover:underline">管理面板</a>
  </footer>

  <script src="asset/js/alpine.js"></script>
  <script>
    const app = {
      url: '',
      slug: '',
      expiry: '', // 添加过期时间属性
      alert: null,
      loading: false,
      isValidated() {
        return !/^https?:\/\/.{3,}/.test(this.url)
      },
      submit($refs, $nextTick) {
        if (!this.url) {
          this.alert = { type: 'error', message: '缺少必需的参数：url。' }
          return
        }

        if (this.isValidated()) {
          this.alert = { type: 'error', message: '非法格式：url。' }
          return
        }

        this.alert = null
        this.loading = true

        const body = { 
          url: this.url, 
          slug: this.slug, 
          expiry: this.expiry
        }

        fetch('/create', {
          method: 'post',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify(body)
        })
          .then(res => res.json())
          .then(res => {
            this.loading = false
            if (res.message) {
              this.alert = { type: 'error', message: res.message }
              return
            }

            this.url = res.link

            $nextTick(() => {
              $refs.url.select()
              this.alert = { type: 'success', message: `链接 ${document.execCommand('Copy') ? '复制' : '生成'} ` }
            })
          })
          .catch(e => {
            this.alert = { type: 'error', message: e.message }
            this.loading = false
          })
      }
    }
  </script>
</body>

</html>
